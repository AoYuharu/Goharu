memory:
  root_dir: ./runtime_memory
  daily:
    dir: ./runtime_memory/daily
    retention_days: 7
prompt:
  system:
    shared: []
    actor:
      - ./prompts/actor/base.md
    summarizer:
      - ./prompts/summarizer/base.md
model:
  large-language-model:
    provider: anthropic_compatible
    model: MiniMax-M2.7
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.minimaxi.com/anthropic
    max_tokens: 1024
    temperature: 0.7
    top_p: 0.9

tools:
  runtime: in_process
  builtin_modules:
    - Tools.builtin.core_tools
    - Tools.builtin.file_tools
    - Tools.builtin.glob_tool
    - Tools.builtin.agent_delegate
  security:
    dangerous_commands:
      - shutdown
      - restart
      - reboot
      - poweroff
      - halt
      - "rm -rf"
      - "del /s"
      - "del /q"
      - "rmdir /s"
      - format
      - diskpart
      - fdisk
      - mkfs
      - dd
      - sudo
      - runas
      - "taskkill /f"
      - killall
      - pkill
      - "reg delete"
      - "reg add"
      - nmap
      - metasploit
      - hydra
      - bcdedit
      - bcdboot
      - "powershell -encodedcommand"
      - "powershell -enc"
    require_confirmation:
      - del
      - rmdir
      - taskkill
      - "reg "
    enabled: true
    allow_confirmation: false

mcp:
  executor: /usr/bin/python3
  args:
    - /root/TableHelper/MCP/MCP.py
  maxDepth: 8

agent_delegate:
  explore:
    max_concurrent: 3
  plan:
    max_concurrent: 2
  timeout: 300
  max_iterations: 20
  max_history_turns: 3

ui:
  verbose: false
  show_reflections: false
  show_memory_events: false
  show_actor_output: true

gateway:
  session:
    storage_path: ./runtime_memory/gateway/sessions.json
    group_sessions_per_user: true
    thread_sessions_per_user: false
    reset_mode: idle
    reset_at_hour: 4
    reset_idle_minutes: 1440

  platforms:
    qq:
      enabled: true
      app_id: "102839705"
      client_secret: "wOrKoInIoLsQyX6gGrS4gJxbGvbHyfN5"
      markdown_support: true
