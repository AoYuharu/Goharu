# Gateway 配置示例

# 在 config.yaml 中添加以下配置：

gateway:
  # Session 配置
  session:
    storage_path: ./runtime_memory/gateway/sessions.json
    # 群聊中是否按用户隔离会话
    group_sessions_per_user: true   # true=每人独立记忆, false=群内共享
    # 线程/话题中是否按用户隔离
    thread_sessions_per_user: false # false=话题内共享 (推荐)
    # 会话重置策略
    reset_mode: idle           # daily | idle | both | none
    reset_at_hour: 4          # 每日重置时间 (凌晨4点)
    reset_idle_minutes: 1440  # 空闲超时 (24小时)

  # 平台配置
  platforms:
    qq:
      enabled: true
      # QQ Bot 认证信息（也可以通过环境变量 QQ_APP_ID 和 QQ_CLIENT_SECRET 设置）
      app_id: "your-app-id"
      client_secret: "your-client-secret"
      # Markdown 支持
      markdown_support: true

    # 可以添加更多平台
    # telegram:
    #   enabled: false
    #   bot_token: "your-bot-token"
