memory:
  root_dir: ./runtime_memory
  sqlite:
    enabled: true
    path: ./runtime_memory/memory.db
  pipeline_manager:
    enabled: true
    l1:
      turn_interval: 5
      warmup_enabled: true
      idle_timeout_seconds: 600
    l2:
      delay_after_l1_seconds: 90
      poll_max_seconds: 3600
    l3:
      new_atom_threshold: 50
  scene_blocks:
    dir: ./runtime_memory/scene_blocks
  persona:
    path: ./runtime_memory/persona.md
  migration:
    marker_path: ./runtime_memory/.migration_v2_done
  retrieval:
    enabled: true
    fts_top_k: 8
    embedding_top_k: 8
    bm25_enabled: true
    bm25_top_k: 8
    final_top_k: 6
    query_window_messages: 6
    use_reranker: false
    embedding_model_name: Qwen3-Embedding-0.6B
    embedding_model_path: ./models/embedding_model/Qwen3-Embedding-0.6B
    embedding_provider: local
    embedding_base_url: ""
    embedding_api_key_env: ""
    embedding_dimensions: 768
    embedding_timeout: 30
    reranker_model_path: ./models/rerank_model/bge-reranker-v2-m3
  pipeline:
    db_enabled: true
  export:
    daily_json_enabled: true
  session_id: default
  daily:
    dir: ./runtime_memory/daily
    retention_days: 7
prompt:
  system:
    shared: []
    actor:
    - ./prompts/actor/base.md
    summarizer:
    - ./prompts/summarizer/base.md
    scene_extractor:
    - ./prompts/scene_extractor/base.md
    persona_generator:
    - ./prompts/persona_generator/base.md
model:
  large-language-model:
    provider: anthropic_compatible
    model: MiniMax-M2.7
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.minimaxi.com/anthropic
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.9
    api_timeout: 120
tools:
  runtime: in_process
  background_timeout: 120  # seconds before moving to background (0 to disable)
  result_budget:
    cache_dir: ./runtime_memory/tool_cache
    max_single_tokens: 8000  # per-result token limit
    max_batch_tokens: 24000  # batch total token limit
  builtin_modules:
  - Tools.builtin.core_tools
  - Tools.builtin.file_tools
  - Tools.builtin.glob_tool
  - Tools.builtin.agent_delegate
  - Tools.builtin.pdf_tools
  - Tools.builtin.system_info_tool
  - Tools.builtin.skill_tool
  - Tools.builtin.snip_tool
  - Tools.builtin.sleep_tool
  security:
    dangerous_commands:
    - shutdown
    - restart
    - reboot
    - poweroff
    - halt
    - rm -rf
    - del /s
    - del /q
    - rmdir /s
    - format
    - diskpart
    - fdisk
    - mkfs
    - dd
    - sudo
    - runas
    - killall
    - pkill
    - reg delete
    - reg add
    - nmap
    - metasploit
    - hydra
    - bcdedit
    - bcdboot
    - powershell -encodedcommand
    - powershell -enc
    require_confirmation:
    - del
    - rmdir
    - taskkill
    - 'reg '
    enabled: true
    allow_confirmation: false
agent:
  maxDepth: 200
  max_context_messages: 20  # 保留最近N条消息，防止上下文爆炸
  background_watch_window: 1800  # 30 min post-answer watch for late completions
  background_max_reactivations: 3  # max times agent can be reactivated by bg tasks
  micro_compact:
    enabled: true
    age_threshold_hours: 1  # messages older than this are candidates for compaction
    keep_tool_results: 5  # keep latest N tool results from expired period
  context_compact:
    enabled: true
    threshold_tokens: 80000   # 超过此 token 数触发自动摘要
    trigger_before_step: true # 每步 actor 调用前检查
  snip:
    enabled: true
    reminder_threshold_tokens: 40000  # 累计token超过此值后每轮提醒使用 Snip
debug:
  enabled: true
logging:
  base_dir: ./runtime_memory/logs
  level: INFO
  max_mb: 5
  backup_count: 3
  api:
    enabled: true
  agents:
    enabled: true
agent_delegate:
  explore:
    max_concurrent: 3
  plan:
    max_concurrent: 2
  verify:
    max_concurrent: 1
    max_iterations: 12
  max_iterations: 20
  max_history_turns: 3
ui:
  verbose: true
  show_memory_events: false
  show_actor_output: true
  show_thinking: true  # 显示模型的thinking过程
  acp:
    enabled: true
    host: 127.0.0.1
    port: 8765
  platforms:
    qq:
      enabled: true
      app_id: '102839705'
      markdown_support: false
test: {}
