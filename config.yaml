memory:
  root_dir: ./runtime_memory
  daily:
    dir: ./runtime_memory/daily
    retention_days: 7
  index:
    path: ./runtime_memory/MEMORY.md
  user:
    path: ./runtime_memory/USER.md
    review_enabled: true
    review_interval: 10
  topic:
    dir: ./runtime_memory/topic
    merge_every_n_summaries: 3
    merge_min_count: 4
prompt:
  system:
    shared: []
    actor:
    - ./prompts/actor/base.md
    - ./Agent/prompts/paper_analysis_sop.md
    reflection:
    - ./prompts/reflection/base.md
    summarizer:
    - ./prompts/summarizer/base.md
    reviewer:
    - ./prompts/reviewer/base.md
    - ./prompts/reviewer/contract.md
model:
  large-language-model:
    provider: anthropic_compatible
    model: MiniMax-M2.7
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.minimaxi.com/anthropic
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.9
    use_native_tools: true
    local_hf:
      name: Qwen2.5-7B-Instruct
      path: E:\TableHelper\Qwen2.5-7B-Instruct
      device_map: cuda
      trust_remote_code: true
      load_in_4bit: true
      bnb_4bit_quant_type: nf4
      bnb_4bit_compute_dtype: float16
      bnb_4bit_use_double_quant: true
      max_new_tokens: 1024
      repetition_penalty: 1.1
tools:
  runtime: in_process
  builtin_modules:
  - Tools.builtin.core_tools
  - Tools.builtin.file_tools
  - Tools.builtin.glob_tool
  - Tools.builtin.agent_delegate
  - Tools.builtin.pdf_tools
  - Tools.builtin.system_info_tool
  - Tools.builtin.skill_tool
  security:
    dangerous_commands:
    - shutdown
    - restart
    - reboot
    - poweroff
    - halt
    - rm -rf
    - del /s
    - del /q
    - rmdir /s
    - format
    - diskpart
    - fdisk
    - mkfs
    - dd
    - sudo
    - runas
    - taskkill /f
    - killall
    - pkill
    - reg delete
    - reg add
    - nmap
    - metasploit
    - hydra
    - bcdedit
    - bcdboot
    - powershell -encodedcommand
    - powershell -enc
    require_confirmation:
    - del
    - rmdir
    - taskkill
    - 'reg '
    enabled: true
    allow_confirmation: false
agent:
  maxDepth: 40
  reflection_mode: never
  max_review_cycles: 3
  max_context_messages: 20  # 保留最近N条消息，防止上下文爆炸
  context_compact:
    enabled: true
    threshold_tokens: 80000   # 超过此 token 数触发自动摘要
    trigger_before_step: true # 每步 actor 调用前检查
debug:
  enabled: true
logging:
  base_dir: ./runtime_memory/logs
  api:
    enabled: true
  agents:
    enabled: true
agent_delegate:
  explore:
    max_concurrent: 3
  plan:
    max_concurrent: 2
  timeout: 600
  max_iterations: 20
  max_history_turns: 3
ui:
  verbose: true
  show_reflections: false
  show_memory_events: false
  show_actor_output: true
  show_thinking: true  # 显示模型的thinking过程
gateway:
  session:
    storage_path: ./runtime_memory/gateway/sessions.json
    group_sessions_per_user: true
    thread_sessions_per_user: false
    reset_mode: idle
    reset_at_hour: 4
    reset_idle_minutes: 1440
  acp:
    enabled: true
    host: 127.0.0.1
    port: 8765
  platforms:
    qq:
      enabled: true
      app_id: '102839705'
      markdown_support: false
test: {}
