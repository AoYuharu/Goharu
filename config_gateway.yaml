# Gateway 服务器配置文件
# 用于远程服务器部署

memory:
  root_dir: ./runtime_memory
  daily:
    dir: ./runtime_memory/daily
    retention_days: 7
  index:
    path: ./runtime_memory/MEMORY.md
  user:
    path: ./runtime_memory/USER.md
    review_enabled: true
    review_interval: 10
  topic:
    dir: ./runtime_memory/topic
    merge_every_n_summaries: 3
    merge_min_count: 4

prompt:
  system:
    shared: []
    actor:
      - ./prompts/actor/base.md
    reflection:
      - ./prompts/reflection/base.md
    summarizer:
      - ./prompts/summarizer/base.md
    reviewer:
      - ./prompts/reviewer/base.md
      - ./prompts/reviewer/contract.md

model:
  large-language-model:
    provider: anthropic_compatible
    model: MiniMax-M2.7
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.minimaxi.com/anthropic
    max_tokens: 1024
    temperature: 0.7
    top_p: 0.9
    use_native_tools: false

tools:
  runtime: in_process
  builtin_modules:
    - Tools.builtin.core_tools
    - Tools.builtin.file_tools
    - Tools.builtin.glob_tool
    - Tools.builtin.agent_delegate
  security:
    dangerous_commands:
      - shutdown
      - restart
      - reboot
      - poweroff
      - halt
      - "rm -rf"
      - "del /s"
      - "del /q"
      - "rmdir /s"
      - format
      - diskpart
      - fdisk
      - mkfs
      - dd
      - sudo
      - runas
      - "taskkill /f"
      - killall
      - pkill
      - "reg delete"
      - "reg add"
      - nmap
      - metasploit
      - hydra
      - bcdedit
      - bcdboot
      - "powershell -encodedcommand"
      - "powershell -enc"
    require_confirmation:
      - del
      - rmdir
      - taskkill
      - "reg "
    enabled: true
    allow_confirmation: false

mcp:
  executor: python3
  args:
    - ./MCP/MCP.py
  maxDepth: 8
  reflection_mode: answer_review
  max_review_cycles: 3

agent_delegate:
  explore:
    max_concurrent: 3
  plan:
    max_concurrent: 2
  timeout: 300
  max_iterations: 20
  max_history_turns: 3

ui:
  verbose: false
  show_reflections: false
  show_memory_events: false
  show_actor_output: true

gateway:
  session:
    storage_path: ./runtime_memory/gateway/sessions.json
    group_sessions_per_user: true
    thread_sessions_per_user: false
    reset_mode: idle
    reset_at_hour: 4
    reset_idle_minutes: 1440

  platforms:
    qq:
      enabled: true
      app_id: "102839705"
      # 使用环境变量或直接配置
      # export QQ_BOT_TOKEN="your_token_here"
      # 或在这里直接配置 bot_token
      bot_token: ""  # 留空，从环境变量读取
      markdown_support: false  # 改为 false，使用纯文本
      sandbox: false  # 生产环境
